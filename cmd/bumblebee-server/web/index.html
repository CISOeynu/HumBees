<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bumblebee fleet console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<header>
  <div class="brand">🐝 bumblebee <span class="sub">fleet console</span></div>
  <nav class="tabs">
    <button class="tab active" data-tab="fleet">Fleet</button>
    <button class="tab" data-tab="reports">Reports</button>
    <button class="tab" data-tab="install">Install Agent</button>
  </nav>
  <div class="summary" id="summary">loading…</div>
</header>

<main>
  <section id="tab-fleet" class="tab-section">
    <div class="toolbar">
      <input id="filter" type="search" placeholder="Filter by hostname, user, OS…">
      <div class="legend">
        <span class="dot red"></span>high/critical &nbsp;
        <span class="dot yellow"></span>low/medium &nbsp;
        <span class="dot green"></span>clean &nbsp;
        <span class="dot gray"></span>stale
      </div>
    </div>
    <div id="grid" class="grid"></div>
  </section>

  <section id="tab-reports" class="tab-section hidden">
    <div class="toolbar">
      <input id="filter-reports" type="search" placeholder="Filter endpoints…">
      <button class="btn btn-primary" id="downloadAll">⬇ Download all reports</button>
    </div>
    <div id="reports-list" class="reports-list"></div>
  </section>

  <section id="tab-install" class="tab-section hidden">
    <div class="install-page" id="installPage"></div>
  </section>
</main>

<div id="detail" class="detail hidden">
  <div class="detail-card">
    <button id="closeDetail" class="close">&times;</button>
    <div id="detailBody"></div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
